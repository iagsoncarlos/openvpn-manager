name: Simple Release

on:
  pull_request:
    branches: [main]
    types: [closed]

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential debhelper dh-python python3-all \
          python3-setuptools python3-dev dpkg-dev devscripts fakeroot
        python -m pip install --upgrade pip setuptools wheel build

    - name: Bump version and changelog
      run: |
        chmod +x ./version.sh
        CURRENT_VERSION=$(cat VERSION)
        ./version.sh patch
        NEW_VERSION=$(cat VERSION)

        if [ "$CURRENT_VERSION" = "$NEW_VERSION" ]; then
          echo "Version did not change after patch bump"
          exit 1
        fi

        echo "NEW_VERSION=$NEW_VERSION" >> "$GITHUB_ENV"
        echo "Version: $CURRENT_VERSION -> $NEW_VERSION"

    - name: Validate Debian changelog
      run: |
        dpkg-parsechangelog > /dev/null

    - name: Build package
      run: |
        chmod +x ./build.sh
        ./build.sh

    - name: Verify package artifact
      run: |
        ls -lh dist/*.deb

    - name: Commit and tag
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add VERSION debian/changelog

        if git diff --cached --quiet; then
          echo "No release changes to commit"
          exit 1
        fi

        git commit -m "release: v$NEW_VERSION"
        git tag -a "v$NEW_VERSION" -m "Release v$NEW_VERSION"
        git push origin main
        git push origin "v$NEW_VERSION"

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ env.NEW_VERSION }}
        name: Release v${{ env.NEW_VERSION }}
        body: |
          ## Release v${{ env.NEW_VERSION }}
          
          Auto-generated release from merged PR.
          
          ### Installation
          ```bash
          sudo dpkg -i openvpn-manager_${{ env.NEW_VERSION }}-1_all.deb
          ```
        files: |
          dist/*.deb
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}